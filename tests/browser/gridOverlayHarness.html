<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>SpriteBoy G2-04 Grid Overlay</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; background: #070b12; }
      * { box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body { display: grid; place-items: center; color: #dcecff; }
      .shell { width: min(760px, calc(100vw - 48px)); }
      .heading { display: flex; justify-content: space-between; align-items: end; margin-bottom: 14px; }
      h1 { margin: 0; font-size: 18px; letter-spacing: .02em; }
      p { margin: 4px 0 0; color: #8293aa; font-size: 12px; }
      .badge { border: 1px solid #164e63; border-radius: 999px; padding: 6px 10px; color: #7dd3fc; font: 700 10px ui-monospace, monospace; }
      .stage-shell { padding: 16px; border: 1px solid #1e293b; border-radius: 16px; background: #0c1422; box-shadow: 0 24px 80px #0009; }
      .stage { position: relative; width: 640px; height: 360px; max-width: 100%; overflow: hidden; border-radius: 10px; background-color: #111827; background-image: linear-gradient(45deg,#182235 25%,transparent 25%),linear-gradient(-45deg,#182235 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#182235 75%),linear-gradient(-45deg,transparent 75%,#182235 75%); background-size: 20px 20px; background-position: 0 0,0 10px,10px -10px,-10px 0; }
      .source { position: absolute; transform-origin: 0 0; image-rendering: pixelated; box-shadow: 0 0 0 1px #e0f2feaa; }
      .readout { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 12px; }
      .metric { border: 1px solid #1e293b; border-radius: 8px; background: #0a101b; padding: 8px; }
      .metric b { display: block; color: #7dd3fc; font: 700 11px ui-monospace, monospace; }
      .metric span { color: #718096; font-size: 9px; text-transform: uppercase; letter-spacing: .08em; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./gridOverlayJourney.tsx"></script>
  </body>
</html>
