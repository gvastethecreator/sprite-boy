name: Studio quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: studio-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  studio-quality:
    name: Studio quality gates
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 24.18.0

      - name: Verify Chrome executable
        shell: bash
        run: |
          chrome_path="$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$chrome_path" ]; then
            echo "A Chrome/Chromium executable is required by the browser gate." >&2
            exit 1
          fi
          printf 'STUDIO_CHROME_PATH=%s\n' "$chrome_path" >> "$GITHUB_ENV"

      - name: Install frozen dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Audit high-severity vulnerabilities
        run: bun audit --audit-level=high

      - name: Run all studio gates
        run: bun scripts/studio-gates.mjs --gate all

      - name: Run production browser smoke gate
        run: bun scripts/studio-gates.mjs --gate e2e
